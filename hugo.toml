baseURL = '/'
locale = 'en-us'
title = 'Arthagaman'
theme = "PaperMod"

# THE MAGIC LINE: This forces both the profile AND the posts to load!
paginate = 5 

[params]
    description = "Discovering the Soul of India"
   
    defaultTheme = "auto"

    # This forces the first post to use a card box!
    DisableSpecialLargeFeatured = true
   
    # These create the visual grid for your travel posts
    homeInfoParams = false
    CoverOpts.card = true

    # This creates a welcoming "Hero" section at the top of your homepage
    [params.profileMode]
        enabled = true 
        title = "Arthagaman"
        subtitle = "Discovering the Soul of India"
       
        # You can add a link to an image/logo of yours here later!
        # imageUrl = "https://yourimage.com/logo.jpg"

[[menu.main]]
    name = "Home"
    url = "/"
    weight = 5

[[menu.main]]
    name = "About"
    url = "/about/"
    weight = 10
