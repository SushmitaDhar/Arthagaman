baseURL = '/'
locale = 'en-us'
title = 'Arthagaman'
theme = "PaperMod"

# This replaces the old paginate command perfectly!
[pagination]
    pagerSize = 5

[params]
    description = "Discovering the Soul of India"
    defaultTheme = "auto"

    # Keeps all posts in clean, uniform boxes
    DisableSpecialLargeFeatured = true
    CoverOpts.card = true

    # Keep this off so we can create a custom landing page in Step 2!
    [params.profileMode]
        enabled = true
        title = "Welcome to Arthagaman"
        subtitle = "Discovering the soul of India"

[[menu.main]]
    name = "The Northeast"
    url = "/categories/the-northeast/"
    weight = 7
    parent = "Home"

[[menu.main]]
    name = "The Southern India"
    url = "/categories/the-southern-india/"
    weight = 8
    parent = "Home"

